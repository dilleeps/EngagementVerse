version: 0.2

env:
  variables:
    IMAGE_REPO_NAME: engagement-verse/backend
    IMAGE_TAG: latest
    AWS_DEFAULT_REGION: us-east-1

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com
      - aws ecr get-login-password --region ${AWS_DEFAULT_REGION} | docker login --username AWS --password-stdin ${ECR_URI}

  build:
    commands:
      - echo "Building Docker image..."
      - cd backend
      - FULL_IMAGE_URI=${ECR_URI}/${IMAGE_REPO_NAME}:${IMAGE_TAG}
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-8)
      - docker build -t ${IMAGE_REPO_NAME}:${IMAGE_TAG} .
      - docker tag ${IMAGE_REPO_NAME}:${IMAGE_TAG} ${FULL_IMAGE_URI}
      - docker tag ${IMAGE_REPO_NAME}:${IMAGE_TAG} ${ECR_URI}/${IMAGE_REPO_NAME}:${COMMIT_HASH}
      - echo "Pushing Docker image to ECR..."
      - docker push ${FULL_IMAGE_URI}
      - docker push ${ECR_URI}/${IMAGE_REPO_NAME}:${COMMIT_HASH}

  post_build:
    commands:
      - printf '[{"name":"ev-backend","imageUri":"%s"}]' ${FULL_IMAGE_URI} > /tmp/imagedefinitions.json
      - echo "Build completed on $(date)"

artifacts:
  files:
    - /tmp/imagedefinitions.json
  discard-paths: yes
